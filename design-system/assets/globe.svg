<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Монохромный вектор. Используется как CSS-маска: цвет задаётся background-color. -->
  <defs>
    <pattern id="globe-dots" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="4.5" cy="4.5" r="1.8" fill="#000"/>
    </pattern>
    <clipPath id="globe-clip"><circle cx="100" cy="100" r="86"/></clipPath>
  </defs>

  <!-- полутоновое поле -->
  <g clip-path="url(#globe-clip)">
    <rect x="0" y="0" width="200" height="200" fill="url(#globe-dots)"/>
  </g>

  <!-- сетка глобуса -->
  <g fill="none" stroke="#000" stroke-width="7" stroke-linecap="round">
    <circle cx="100" cy="100" r="86"/>
    <ellipse cx="100" cy="100" rx="30" ry="86"/>
    <ellipse cx="100" cy="100" rx="60" ry="86"/>
    <line x1="100" y1="14" x2="100" y2="186"/>
  </g>
  <g clip-path="url(#globe-clip)" stroke="#000" stroke-width="7" stroke-linecap="round">
    <line x1="14" y1="100" x2="186" y2="100"/>
    <line x1="22" y1="60" x2="178" y2="60"/>
    <line x1="22" y1="140" x2="178" y2="140"/>
  </g>
</svg>
